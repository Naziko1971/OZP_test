function render() {
    const container = document.getElementById('app-container');
    const header = document.getElementById('main-header');
    container.innerHTML = '';
    
    if (state.view === 'login') {
        header.classList.add('hidden');
        renderLogin(container);
    } else {
        header.classList.remove('hidden');
        document.getElementById('user-display').textContent = `Пайдаланушы: ${state.user.username}`;
        
        if (state.view === 'home') renderHome(container);
        else if (state.view === 'quiz') renderQuiz(container);
        else if (state.view === 'result') renderResult(container);
    }
    window.scrollTo(0, 0);
}

                        let style = "bg-sky-50/30 border-sky-100 text-sky-800";
                        let icon = "";
                        if (state.isAnswered) {
                            if (idx === q.correct) {
                                style = "bg-emerald-50 border-emerald-500 text-emerald-700 ring-2 ring-emerald-500/20";
                                icon = '<i class="fas fa-check-circle text-emerald-500 scale-125"></i>';
                            } else if (idx === state.selectedOption) {
                                style = "bg-rose-50 border-rose-500 text-rose-700 ring-2 ring-rose-500/20";
                                icon = '<i class="fas fa-times-circle text-rose-500 scale-125"></i>';
                            } else { style = "opacity-30 blur-[0.5px]"; }
                        } else if (idx === state.selectedOption) { style = "bg-sky-100 border-sky-500 text-sky-900 ring-2 ring-sky-500/20"; }
                        return `<button onclick="handleOptionSelect(${idx})" ${state.isAnswered ? 'disabled' : ''} class="option-btn w-full p-6 rounded-2xl border-2 text-left font-semibold flex items-center justify-between shadow-sm ${style}"><span>${opt}</span>${icon}</button>`;
                    }).join('')}
                </div>
            </div>

            <div class="flex flex-col md:flex-row justify-between items-center gap-6 pt-6">
                <button onclick="goHome()" class="text-sky-400 hover:text-sky-700 font-bold text-xs transition-colors uppercase tracking-[0.2em] flex items-center">
                    <i class="fas fa-arrow-left mr-3"></i> Бас мәзірге қайту
                </button>
                <button onclick="handleNext()" ${!state.isAnswered ? 'disabled' : ''} 
                    class="w-full md:w-auto px-14 py-5 rounded-2xl font-bold bg-sky-600 text-white shadow-2xl shadow-sky-200 disabled:opacity-30 disabled:shadow-none transition-all flex items-center justify-center gap-4 text-lg">
                    ${state.currentIndex === level.questions.length - 1 ? 'Нәтиже' : 'Келесі сұрақ'} <i class="fas fa-chevron-right text-sm"></i>
                </button>
            </div>
        </div>
    `;
}

function renderResult(container) {
    const level = findLevelById(state.currentLevelId);
    const percent = Math.round((state.score / level.questions.length) * 100);
    
    container.innerHTML = `
        <div class="fade-in text-center space-y-10">
            <div class="blue-card p-12 md:p-16 rounded-[4rem] relative overflow-hidden">
                <div class="w-24 h-24 bg-sky-100 text-sky-600 rounded-3xl flex items-center justify-center mx-auto mb-10 text-4xl shadow-inner">
                    <i class="fas fa-award"></i>
                </div>
                <h2 class="text-4xl font-black mb-3 text-sky-900 tracking-tight">Керемет!</h2>
                <p class="text-sky-500 font-bold mb-12 uppercase tracking-widest text-xs">"${level.levelName}" аяқталды</p>
                <div class="flex justify-center items-center gap-12 md:gap-20">
                    <div>
                        <div class="text-6xl font-black text-sky-900 mb-3">${state.score}</div>
                        <div class="text-[11px] font-bold text-sky-400 uppercase tracking-[0.3em]">Дұрыс</div>
                    </div>
                    <div class="w-px h-20 bg-sky-100"></div>
                    <div>
                        <div class="text-6xl font-black text-sky-600 mb-3">${percent}%</div>
                        <div class="text-[11px] font-bold text-sky-400 uppercase tracking-[0.3em]">Жалпы</div>
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <button onclick="goHome()" class="w-full py-5 bg-sky-100 text-sky-700 font-black rounded-3xl hover:bg-sky-200 transition-all text-lg border-2 border-sky-200 shadow-sm">Бас мәзір</button>
                <button onclick="downloadExcel()" class="w-full py-5 bg-emerald-600 text-white font-black rounded-3xl shadow-2xl shadow-emerald-200 hover:bg-emerald-700 transition-all flex items-center justify-center gap-3 text-lg">
                    <i class="fas fa-file-excel"></i> Excel-де сақтау
                </button>
            </div>
        </div>
    `;
}

// Logic functions
function handleLogin() {
    const user = document.getElementById('login-user').value.trim();
    const pass = document.getElementById('login-pass').value.trim();
    if (user && pass) {
        state.user = { username: user };
        state.view = 'home';
        render();
    } else {
        alert("Аты-жөніңіз бен құпия сөзді толтырыңыз!");
    }
}

function logout() {
    state.user = null;
    state.view = 'login';
    render();
}

function goHome() {
    state.view = 'home';
    render();
}

function findLevelById(id) {
    for (const group of quizData) {
        const found = group.levels.find(l => l.id === id);
        if (found) return found;
    }
    return null;
}

window.startQuiz = (id) => {
    state = { ...state, view: 'quiz', currentLevelId: id, currentIndex: 0, score: 0, selectedOption: null, isAnswered: false, userAnswers: [] };
    render();
};

window.handleOptionSelect = (idx) => {
    if (state.isAnswered) return;
    state.selectedOption = idx;
    state.isAnswered = true;
    const q = findLevelById(state.currentLevelId).questions[state.currentIndex];
    if (idx === q.correct) state.score++;
    state.userAnswers.push({ 
        "Сұрақ": q.question, 
        "Пайдаланушы жауабы": q.options[idx], 
        "Дұрыс жауап": q.options[q.correct],
        "Нәтиже": idx === q.correct ? "Дұрыс" : "Қате"
    });
    render();
};

window.handleNext = () => {
    const level = findLevelById(state.currentLevelId);
    if (state.currentIndex < level.questions.length - 1) {
        state.currentIndex++;
        state.isAnswered = false;
        state.selectedOption = null;
        render();
    } else {
        state.allResults.push({
            "Студент": state.user.username,
            "Күні": new Date().toLocaleString(),
            "Тарау": level.levelName,
            "Ұпай": state.score,
            "Пайыз": Math.round((state.score / level.questions.length) * 100) + "%"
        });
        state.view = 'result';
        render();
    }
};

function downloadExcel() {
    const level = findLevelById(state.currentLevelId);
    const summary = [
        {"Аты-жөні": state.user.username, "Сынақ": level.levelName, "Күні": new Date().toLocaleString(), "Жиынтық ұпай": state.score + "/" + level.questions.length, "Пайыз": Math.round((state.score / level.questions.length) * 100) + "%"},
        {},
        {"Сұрақ": "Сұрақтар тізімі", "Пайдаланушы жауабы": "Жауап", "Дұрыс жауап": "Дұрыс", "Нәтиже": "Статус"}
    ];
    
    const finalData = summary.concat(state.userAnswers);
    const ws = XLSX.utils.json_to_sheet(finalData, { skipHeader: true });
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Нәтижелер");
    XLSX.writeFile(wb, `${state.user.username}_${level.id}_ozp_test.xlsx`);
}

render();
</script>

</body>
</html>
